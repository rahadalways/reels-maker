services:
  reels:
    build: .
    image: reels-maker
    ports:
      - "5000:5000"
    environment:
      - REELS_HOST=0.0.0.0
      - REELS_PORT=5000
      - REELS_LLM_API_KEY=${REELS_LLM_API_KEY}
      - REELS_UI_PASSWORD=${REELS_UI_PASSWORD}
    volumes:
      - ./output:/app/output        # banano clip host e thakuk
      - models:/models              # Whisper model cache (ekbar download)
    restart: unless-stopped

volumes:
  models:
